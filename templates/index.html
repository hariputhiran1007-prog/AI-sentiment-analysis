<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Sentiment Analysis</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="app-shell">
        <section class="analysis-panel">
            <div class="heading">
                <p class="eyebrow">Machine Learning Project</p>
                <h1>AI Based Sentiment Analysis System</h1>
                <p class="subtitle">Analyze a review or comment and classify it as Positive, Negative, or Neutral.</p>
            </div>

            <form method="post" class="review-form">
                <label for="review">Review or Comment</label>
                <textarea
                    id="review"
                    name="review"
                    rows="7"
                    placeholder="Type a review here..."
                    required
                >{{ review_text }}</textarea>
                <button type="submit">Analyze Sentiment</button>
            </form>

            {% if error %}
                <div class="message error">{{ error }}</div>
            {% endif %}

            {% if result %}
                <div class="result result-{{ result.sentiment | lower }}">
                    <span class="result-label">Predicted Sentiment</span>
                    <strong>{{ result.sentiment }}</strong>
                    <span class="confidence">Confidence: {{ result.confidence }}%</span>
                </div>
            {% endif %}
        </section>
    </main>
</body>
</html>
